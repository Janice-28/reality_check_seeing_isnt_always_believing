name: deepfakeaudiodetection
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy=1.24.3
  - pip:
    - flask>=2.0.0
    - librosa>=0.10.0
    - soundfile>=0.10.3
    - tensorflow>=2.10.0; platform_system!='Darwin' or platform_machine!='arm64'
    - tensorflow-macos>=2.10.0; platform_system=='Darwin' and platform_machine=='arm64'
    - scikit-learn>=1.0.0
    - matplotlib>=3.4.0
    - numba>=0.56.4